<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-label="GitHub contributions snake animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="200" rx="20" fill="url(#bg)"/>
  <g opacity="0.22" fill="#58a6ff">
    <circle cx="100" cy="40" r="6"/>
    <circle cx="160" cy="40" r="6"/>
    <circle cx="220" cy="40" r="6"/>
    <circle cx="280" cy="40" r="6"/>
    <circle cx="340" cy="40" r="6"/>
    <circle cx="400" cy="40" r="6"/>
    <circle cx="460" cy="40" r="6"/>
    <circle cx="520" cy="40" r="6"/>
    <circle cx="580" cy="40" r="6"/>
    <circle cx="640" cy="40" r="6"/>
    <circle cx="700" cy="40" r="6"/>
    <circle cx="760" cy="40" r="6"/>
    <circle cx="820" cy="40" r="6"/>
    <circle cx="880" cy="40" r="6"/>
    <circle cx="940" cy="40" r="6"/>
    <circle cx="1000" cy="40" r="6"/>
    <circle cx="1060" cy="40" r="6"/>
  </g>
  <path d="M60 120 C140 40, 220 190, 300 120 S460 40, 540 120 S700 190, 780 120 S940 40, 1020 120 S1100 190, 1140 120"
        fill="none" stroke="url(#snake)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="28 18">
    <animate attributeName="stroke-dashoffset" values="0;-92" dur="4s" repeatCount="indefinite"/>
  </path>
  <g fill="#7ee787">
    <circle cx="1140" cy="120" r="16"/>
    <circle cx="1146" cy="116" r="3" fill="#0d1117"/>
    <circle cx="1152" cy="116" r="3" fill="#0d1117"/>
  </g>
  <text x="50%" y="175" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#c9d1d9">
    GitHub snake animation
  </text>
</svg>
